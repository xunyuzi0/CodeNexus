# 端口配置
server.port=8080
# 数据库连接配置
# 连 Docker 的 13306
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:13306/codenexus?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
# Redis 配置
# 连 Docker 的 6380
spring.data.redis.host=localhost
spring.data.redis.port=6380
# MyBatis Plus 配置
# 1. 配置 XML 文件位置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
# 2. 打印 SQL 日志 (开发环境开启，方便调试)
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 3. 实体类扫描包 (XML resultType 可以少写包名)
mybatis-plus.type-aliases-package=com.xunyu.codenexus.backend.model.entity
# CodeNexus 自定义配置
# JWT 签名密钥
codenexus.jwt.secret=d8c986df-8512-42b5-906f- even9b3acf86-codenexus-secure
# JWT 过期时间 (7天 = 7 * 24 * 60 * 60 * 1000 = 604800000 毫秒)
codenexus.jwt.expiration=604800000